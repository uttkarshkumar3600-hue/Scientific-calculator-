<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="display-section">
                <input type="text" id="display" class="display" readonly placeholder="0">
                <div class="mode-indicator">
                    <span id="angleMode" class="mode-badge">DEG</span>
                    <span id="memoryIndicator" class="mode-badge hidden">M</span>
                </div>
            </div>

            <div class="button-grid">
                <!-- Memory Functions -->
                <button class="btn func-btn" data-action="memClear">MC</button>
                <button class="btn func-btn" data-action="memRecall">MR</button>
                <button class="btn func-btn" data-action="memAdd">M+</button>
                <button class="btn func-btn" data-action="memSubtract">M-</button>

                <!-- Angle Mode -->
                <button class="btn func-btn" data-action="toggleAngleMode">DEG/RAD</button>
                <button class="btn func-btn" data-action="clear">AC</button>
                <button class="btn func-btn" data-action="delete">DEL</button>
                <button class="btn operator-btn" data-operator="/">÷</button>

                <!-- Row 2 -->
                <button class="btn func-btn" data-action="sin">sin</button>
                <button class="btn number-btn" data-number="7">7</button>
                <button class="btn number-btn" data-number="8">8</button>
                <button class="btn number-btn" data-number="9">9</button>
                <button class="btn operator-btn" data-operator="*">×</button>

                <!-- Row 3 -->
                <button class="btn func-btn" data-action="cos">cos</button>
                <button class="btn number-btn" data-number="4">4</button>
                <button class="btn number-btn" data-number="5">5</button>
                <button class="btn number-btn" data-number="6">6</button>
                <button class="btn operator-btn" data-operator="-">−</button>

                <!-- Row 4 -->
                <button class="btn func-btn" data-action="tan">tan</button>
                <button class="btn number-btn" data-number="1">1</button>
                <button class="btn number-btn" data-number="2">2</button>
                <button class="btn number-btn" data-number="3">3</button>
                <button class="btn operator-btn" data-operator="+">+</button>

                <!-- Row 5 -->
                <button class="btn func-btn" data-action="log">log</button>
                <button class="btn func-btn" data-action="sqrt">√</button>
                <button class="btn number-btn" data-number="0">0</button>
                <button class="btn number-btn" data-number=".">.</button>
                <button class="btn equals-btn" data-action="equals">=</button>

                <!-- Row 6 -->
                <button class="btn func-btn" data-action="ln">ln</button>
                <button class="btn func-btn" data-action="power">x²</button>
                <button class="btn func-btn" data-action="reciprocal">1/x</button>
                <button class="btn func-btn" data-action="pi">π</button>
                <button class="btn func-btn" data-action="factorial">n!</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
